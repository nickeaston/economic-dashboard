name: Refresh economic dashboard

on:
  schedule:
    # Runs daily at 21:30 UTC. That's 07:30 AEST (winter, UTC+10) or 08:30 AEDT
    # (summer, UTC+11) on the *next* day in Melbourne. The `check` job below
    # filters so the refresh only happens on Melbourne's 1st and 15th.
    - cron: '30 21 * * *'
  workflow_dispatch:
    # "Refresh Now" button on the dashboard links here — click "Run workflow".
    # Manual dispatch bypasses the date gate and always refreshes.

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - id: gate
        run: |
          DAY=$(TZ=Australia/Melbourne date +%-d)
          MELB_DATE=$(TZ=Australia/Melbourne date '+%Y-%m-%d %H:%M %Z')
          echo "Melbourne now: $MELB_DATE (day-of-month = $DAY)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — proceeding."
            echo "proceed=yes" >> "$GITHUB_OUTPUT"
          elif [ "$DAY" = "1" ] || [ "$DAY" = "15" ]; then
            echo "Scheduled trigger on Melbourne day $DAY — proceeding."
            echo "proceed=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Scheduled trigger on Melbourne day $DAY — skipping (only runs 1st/15th)."
            echo "proceed=no" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: check
    if: needs.check.outputs.proceed == 'yes'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet yfinance requests

      - name: Fetch 10y data from APIs (yfinance, IMF, ABS, RBA, World Bank)
        run: python economic_dashboard_update.py

      - name: Render HTML + email
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python generate_dashboard.py
          # GitHub Pages defaults to index.html — mirror the rendered HTML there
          cp economic_dashboard.html index.html

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add economic_data.json economic_dashboard.html index.html
          git diff --cached --quiet || git commit -m "Refresh $(date -u +%Y-%m-%d)"
          git push
